[project]
name = "pk-exporter"
version = "0.1.0"
description = "Export PKNA dataset"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "docling-core>=2.25.0",
    "dspy>=3.0.1",
    "google-genai>=1.8.0",
    "jupyter>=1.1.1",
    "layoutparser[layoutmodels]>=0.3.4",
    "mlflow>=3.2.0",
    "opencv-python>=4.11.0.86",
    "pandas>=2.2.3",
    "pillow>=11.1.0",
    "pydantic>=2.11.0",
    "pytesseract>=0.3.13",
    "python-dotenv>=1.1.0",
    "rich>=14.0.0",
    "scikit-learn>=1.7.0",
    "streamlit>=1.45.1",
    "torch>=2.6.0",
    "unsloth>=2025.7.8",
    "vllm>=0.8.3",
]

[tool.uv]
link-mode = "symlink"
